name: 🔄 Update Live Dashboard Data

on:
  # ── Run automatically every 6 hours ──────────────────────────────────────
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC

  # ── Also allow manual trigger from GitHub Actions tab ─────────────────────
  workflow_dispatch:
    inputs:
      force_fetch:
        description: 'Force fresh news fetch even if cached'
        required: false
        default: 'false'

jobs:
  update-dashboard:
    name: Run Market Engine & Push Data
    runs-on: ubuntu-latest          # 7GB RAM — enough for FinBERT
    timeout-minutes: 60             # Safety limit

    steps:
      # ── 1. Checkout the repository ─────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: frontend-contribution    # Your working branch
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── 2. Set up Python 3.10 ──────────────────────────────────────────────
      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'               # Cache pip packages for faster runs

      # ── 3. Install system dependencies ────────────────────────────────────
      - name: 🔧 Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgomp1  # OpenMP for faiss-cpu

      # ── 4. Install Python packages ─────────────────────────────────────────
      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install pytrends if not already in requirements
          pip install pytrends --quiet || true

      # ── 5. Create required directories ────────────────────────────────────
      - name: 📁 Create Required Directories
        run: |
          mkdir -p data/raw
          mkdir -p data/processed
          mkdir -p data/output
          mkdir -p frontend/public
          mkdir -p vector_store/news_index

      # ── 6. Download NLTK data ─────────────────────────────────────────────
      - name: 📚 Download NLTK Data
        run: |
          python -c "
          import nltk
          nltk.download('punkt', quiet=True)
          nltk.download('stopwords', quiet=True)
          nltk.download('wordnet', quiet=True)
          nltk.download('averaged_perceptron_tagger', quiet=True)
          print('NLTK data ready.')
          "

      # ── 7. Run the Market Intelligence Engine ─────────────────────────────
      - name: 🚀 Run Market Engine
        env:
          NEWS_API_KEY:  ${{ secrets.NEWS_API_KEY }}
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          SERP_API_KEY:  ${{ secrets.SERP_API_KEY }}
          # Force fresh fetch if triggered manually with force_fetch=true
          FORCE_FETCH:   ${{ github.event.inputs.force_fetch || 'false' }}
        run: |
          echo "🏁 Starting market engine at $(date)"
          python run_market_engine.py
          echo "✅ Engine completed at $(date)"

      # ── 8. Verify outputs were generated ──────────────────────────────────
      - name: ✅ Verify Output Files
        run: |
          echo "=== Checking generated files ==="
          if [ -f "frontend/public/market_dashboard_data.json" ]; then
            SIZE=$(wc -c < frontend/public/market_dashboard_data.json)
            echo "✅ market_dashboard_data.json — ${SIZE} bytes"
          else
            echo "❌ market_dashboard_data.json MISSING"
            exit 1
          fi

          if [ -f "frontend/public/market_report.pdf" ]; then
            echo "✅ market_report.pdf — present"
          else
            echo "⚠️  market_report.pdf not found (non-fatal)"
          fi

          # Validate JSON
          python -c "
          import json
          with open('frontend/public/market_dashboard_data.json') as f:
              data = json.load(f)
          print(f'✅ JSON valid — timestamp: {data.get(\"timestamp\", \"unknown\")}')
          print(f'   Brands tracked: {len(data.get(\"brand_insights\", {}).get(\"brand_direction\", []))}')
          print(f'   Trend: {data.get(\"market_overview\", {}).get(\"trend_direction\", \"N/A\")}')
          "

      # ── 9. Commit and push updated data files ─────────────────────────────
      - name: 📤 Commit & Push Updated Dashboard Data
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the data files (not model cache or large binaries)
          git add frontend/public/market_dashboard_data.json
          git add frontend/public/market_report.pdf || true
          git add data/output/market_dashboard_data.json || true
          git add data/output/alerts.json || true

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "ℹ️ No changes detected — dashboard is already up to date."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "🔄 Auto-update dashboard data — ${TIMESTAMP}"
            git push origin frontend-contribution
            echo "✅ Pushed updated data to GitHub!"
            echo "   Vercel will auto-redeploy the dashboard."
          fi

      # ── 10. Summary ────────────────────────────────────────────────────────
      - name: 📋 Run Summary
        if: always()
        run: |
          echo "======================================"
          echo "  AI Market Dashboard — Run Summary"
          echo "======================================"
          echo "  Completed at: $(date -u)"
          echo "  Branch: frontend-contribution"
          echo "  Next run: In ~6 hours (automatic)"
          echo "======================================"
